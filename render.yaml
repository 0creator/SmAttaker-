# ─────────────────────────────────────────────────────────
# SmAttaker — Render Deployment Config
# ─────────────────────────────────────────────────────────

services:
  - type: web
    name: smattaker-backend
    env: python
    runtime: python3.12
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smattaker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: smattaker-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generate: true
      - key: ENCRYPTION_KEY
        generate: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false

  - type: redis
    name: smattaker-redis
    ipAllowList: []

databases:
  - name: smattaker-db
    databaseName: smattaker
    user: smattaker
    plan: free
