# ─────────────────────────────────────────────────────────
# SmAttaker — Docker Compose (Local Dev)
# ─────────────────────────────────────────────────────────

version: "3.8"

services:
  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smattaker-db
    environment:
      POSTGRES_USER: smattaker
      POSTGRES_PASSWORD: smattaker_secret
      POSTGRES_DB: smattaker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smattaker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smattaker-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API + Bot ─────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: smattaker-backend
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://smattaker:smattaker_secret@postgres:5432/smattaker
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
